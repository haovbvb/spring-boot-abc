spring:
  profiles:
    active: dev
  application:
    name: abc-application
  main:
    allow-bean-definition-overriding: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration/common

server:
  port: 8080
  compression:
    enabled: true
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      group:
        deploy:
          include: ping,version
          show-details: always
          show-components: always
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

abc:
  security:
    jwt-secret: ${ABC_JWT_SECRET:change-me-change-me-change-me-change-me}
    jwt-expire: 7200
