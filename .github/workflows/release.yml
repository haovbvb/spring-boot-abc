name: Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Debug constants: only for temporary debugging, do NOT commit real credentials.
  DEPLOY_HOST_DEBUG: "8.163.10.211"
  DEPLOY_USER_DEBUG: "root"
  DEPLOY_PORT_DEBUG: "22"
  # JWT secret should be >= 32 chars for HMAC security. Debug only; use GitHub Secrets in production.
  ABC_JWT_SECRET_DEBUG: "44f5b23a16c8bf050a688c2bbe7cbebe70b4c846859cf3d74beb473c4dce35e80a488d74c0ec62752ebb1956388de9e4"

jobs:
  build-and-push:
    name: Build image & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Package
        run: mvn -B -U -DskipTests clean package

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy via SSH
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST || env.DEPLOY_HOST_DEBUG }}
          username: ${{ secrets.DEPLOY_USER || env.DEPLOY_USER_DEBUG }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || env.DEPLOY_PORT_DEBUG }}
          envs: GHCR_USER,GHCR_TOKEN,IMAGE,ABC_JWT_SECRET,SPRING_PROFILES_ACTIVE
          script: |
            set -euo pipefail
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull "$IMAGE"
            docker rm -f abc-app 2>/dev/null || true
            docker run -d --name abc-app --restart=always \
              --network abc-net \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE="$SPRING_PROFILES_ACTIVE" \
              -e ABC_JWT_SECRET="$ABC_JWT_SECRET" \
              -e TZ=Asia/Shanghai \
              "$IMAGE"
            docker image prune -f
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ghcr.io/${{ github.repository }}:${{ needs.build-and-push.outputs.version }}
          ABC_JWT_SECRET: ${{ secrets.ABC_JWT_SECRET || env.ABC_JWT_SECRET_DEBUG }}
          SPRING_PROFILES_ACTIVE: prod
