name: Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      service_name:
        description: "Deploy service name (unique per backend service)"
        required: false
        default: "abc"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Debug constants: only for temporary debugging, do NOT commit real credentials.
  DEPLOY_HOST_DEBUG: "8.163.10.211"
  DEPLOY_USER_DEBUG: "root"
  DEPLOY_PORT_DEBUG: "22"
  DEPLOY_SERVICE_NAME_DEBUG: "abc"
  DEPLOY_ROOT_DEBUG: "/opt/services"
  DEPLOY_DATA_ROOT_DEBUG: "/data/services"
  # JWT secret should be >= 32 chars for HMAC security. Debug only; use GitHub Secrets in production.
  ABC_JWT_SECRET_DEBUG: ${{ secrets.ABC_JWT_SECRET || 'AbcJwtSecret_2026_Prod_AtLeast_32Chars' }}

jobs:
  build-and-push:
    name: Build image & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Package
        run: mvn -B -U -DskipTests clean package

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build & push (main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy via SSH
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    env:
      GHCR_USER: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      IMAGE: ghcr.io/${{ github.repository }}:${{ needs.build-and-push.outputs.version }}
      APP_VERSION: ${{ github.sha }}
      SERVICE_NAME: ${{ github.event.inputs.service_name || vars.DEPLOY_SERVICE_NAME || env.DEPLOY_SERVICE_NAME_DEBUG }}
      DEPLOY_ROOT: ${{ vars.DEPLOY_ROOT || env.DEPLOY_ROOT_DEBUG }}
      DEPLOY_DATA_ROOT: ${{ vars.DEPLOY_DATA_ROOT || env.DEPLOY_DATA_ROOT_DEBUG }}
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD || 'AbcRoot_2026_Prod' }}
      MYSQL_APP_PASSWORD: ${{ secrets.MYSQL_APP_PASSWORD || 'AbcApp_2026_Prod' }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD || 'AbcRedis_2026_Prod' }}
      ABC_JWT_SECRET: ${{ secrets.ABC_JWT_SECRET || env.ABC_JWT_SECRET_DEBUG }}
      SPRING_PROFILES_ACTIVE: ${{ vars.SPRING_PROFILES_ACTIVE || 'prod' }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare remote directories
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST || env.DEPLOY_HOST_DEBUG }}
          username: ${{ secrets.DEPLOY_USER || env.DEPLOY_USER_DEBUG }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || env.DEPLOY_PORT_DEBUG }}
          timeout: 60s
          command_timeout: 5m
          envs: SERVICE_NAME,DEPLOY_ROOT,DEPLOY_DATA_ROOT
          script: |
            set -euo pipefail

            APP_HOME="$DEPLOY_ROOT/$SERVICE_NAME"
            DATA_ROOT="$DEPLOY_DATA_ROOT/$SERVICE_NAME"

            mkdir -p "$APP_HOME" "$DATA_ROOT/mysql" "$DATA_ROOT/redis" "$DATA_ROOT/app-logs"
            chown -R 999:999 "$DATA_ROOT/mysql" "$DATA_ROOT/redis" || true
            chown -R 1000:1000 "$DATA_ROOT/app-logs" || true

      - name: Upload compose template
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST || env.DEPLOY_HOST_DEBUG }}
          username: ${{ secrets.DEPLOY_USER || env.DEPLOY_USER_DEBUG }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || env.DEPLOY_PORT_DEBUG }}
          source: deploy/docker-compose.prod.yml
          target: ${{ env.DEPLOY_ROOT }}/${{ env.SERVICE_NAME }}/
          strip_components: 1

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST || env.DEPLOY_HOST_DEBUG }}
          username: ${{ secrets.DEPLOY_USER || env.DEPLOY_USER_DEBUG }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || env.DEPLOY_PORT_DEBUG }}
          timeout: 300s
          command_timeout: 40m
          envs: GHCR_USER,GHCR_TOKEN,IMAGE,APP_VERSION,ABC_JWT_SECRET,SPRING_PROFILES_ACTIVE,SERVICE_NAME,DEPLOY_ROOT,DEPLOY_DATA_ROOT,MYSQL_ROOT_PASSWORD,MYSQL_APP_PASSWORD,REDIS_PASSWORD
          script: |
            set -euo pipefail

            retry() {
              local max=3
              local attempt=1
              while true; do
                if "$@"; then
                  return 0
                fi
                if [ "$attempt" -ge "$max" ]; then
                  return 1
                fi
                attempt=$((attempt + 1))
                echo "command failed, retrying ($attempt/$max): $*"
                sleep 5
              done
            }

            wait_for_health() {
              local url="http://127.0.0.1:18080/actuator/health/deploy"
              local attempts=24
              local i=1
              while [ "$i" -le "$attempts" ]; do
                if command -v curl >/dev/null 2>&1; then
                  if curl -fsS --max-time 3 "$url" >/dev/null; then
                    return 0
                  fi
                else
                  if wget -qO- --timeout=3 "$url" >/dev/null; then
                    return 0
                  fi
                fi
                echo "waiting for health (${i}/${attempts}): $url"
                sleep 5
                i=$((i + 1))
              done
              return 1
            }

            set_env_value() {
              local key="$1"
              local value="$2"
              if grep -q "^${key}=" "$APP_HOME/.env"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$APP_HOME/.env"
              else
                echo "${key}=${value}" >> "$APP_HOME/.env"
              fi
            }

            APP_HOME="$DEPLOY_ROOT/$SERVICE_NAME"
            DATA_ROOT="$DEPLOY_DATA_ROOT/$SERVICE_NAME"
            COMPOSE_FILE="$APP_HOME/docker-compose.prod.yml"

            if [ ! -f "$COMPOSE_FILE" ]; then
              echo "compose file not found: $COMPOSE_FILE"
              exit 1
            fi

            PREV_IMAGE="$(docker inspect --format='{{.Config.Image}}' "${SERVICE_NAME}-app-1" 2>/dev/null || true)"

            cat > "$APP_HOME/.env" <<EOF
            SERVICE_NAME=$SERVICE_NAME
            COMPOSE_PROJECT_NAME=$SERVICE_NAME
            IMAGE=$IMAGE
            APP_VERSION=$APP_VERSION
            APP_IMAGE=$IMAGE
            SPRING_PROFILES_ACTIVE=$SPRING_PROFILES_ACTIVE
            ABC_DATA_ROOT=$DATA_ROOT
            MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
            MYSQL_APP_PASSWORD=$MYSQL_APP_PASSWORD
            REDIS_PASSWORD=$REDIS_PASSWORD
            ABC_JWT_SECRET=$ABC_JWT_SECRET
            EOF
            chmod 600 "$APP_HOME/.env"

            cd "$APP_HOME"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            retry docker compose --env-file .env -f "$COMPOSE_FILE" pull app
            retry docker compose --env-file .env -f "$COMPOSE_FILE" up -d --remove-orphans

            if ! wait_for_health; then
              echo "deployment health check failed"
              docker compose --env-file .env -f "$COMPOSE_FILE" logs --tail=200 app || true

              if [ -n "$PREV_IMAGE" ]; then
                echo "rolling back to previous image: $PREV_IMAGE"
                set_env_value IMAGE "$PREV_IMAGE"
                retry docker compose --env-file .env -f "$COMPOSE_FILE" up -d --remove-orphans

                if ! wait_for_health; then
                  echo "rollback health check failed"
                  docker compose --env-file .env -f "$COMPOSE_FILE" logs --tail=200 app || true
                  exit 1
                fi
              else
                echo "no previous image found, rollback skipped"
                exit 1
              fi
            fi

            docker image prune -f
